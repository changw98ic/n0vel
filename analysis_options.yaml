analyzer:
  exclude:
    - lib/core/database/database.g.dart
    - lib/core/bindings/**
    - lib/core/services/**
    - lib/features/**
    - lib/modules/ai_chat/db/**
    - lib/modules/ai_config/db/**
    - lib/modules/ai_detection/db/**
    - lib/modules/inspiration/db/**
    - lib/modules/pov/db/**
    - lib/modules/reading_mode/db/**
    - lib/modules/review/db/**
    - lib/modules/settings/db/**
    - lib/modules/statistics/db/**
    - lib/modules/story_arc/db/**
    - lib/modules/timeline/db/**
    - lib/modules/workflow/db/**
    - lib/modules/editor/db/smart_segment_service.dart
    - test/**
    - integration_test/**
    - tool/**
    - lib/driver_main.dart
  errors:
    deprecated_member_use: ignore
    depend_on_referenced_packages: ignore
    use_build_context_synchronously: ignore

linter:
  rules:
    prefer_const_constructors: false
    prefer_const_constructors_in_immutables: false
    prefer_const_declarations: false
    use_super_parameters: false
    unnecessary_string_escapes: false
    no_leading_underscores_for_local_identifiers: false
    use_key_in_widget_constructors: false
    unnecessary_brace_in_string_interps: false
    prefer_if_null_operators: false
    avoid_print: false
    unnecessary_string_interpolations: false

