name: writing_assistant
description: "AI-powered writing assistant for novel authors"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # 状态管理
  get: ^4.6.6

  # 屏幕适配
  flutter_screenutil: ^5.9.0

  # 数据库
  drift: ^2.14.0
  sqlite3_flutter_libs: ^0.5.0
  path: ^1.8.0

  # 网络
  dio: ^5.4.0

  # 序列化
  freezed_annotation: ^2.4.0
  json_annotation: ^4.8.0

  # 工具
  uuid: ^4.2.1
  path_provider: ^2.1.1
  archive: ^3.4.9
  image_picker: ^1.0.7
  image_cropper: ^5.0.1
  flutter_svg: ^2.0.9
  collection: ^1.18.0
  intl: ^0.20.2
  window_manager: ^0.3.8

  # 图表
  fl_chart: ^0.66.0

  # Markdown
  flutter_markdown: ^0.6.18

  # 本地存储
  shared_preferences: ^2.2.2

  # 加密
  flutter_secure_storage: ^9.0.0
  crypto: ^3.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_driver:
    sdk: flutter
  flutter_lints: ^3.0.1

  # 代码生成
  drift_dev: ^2.14.0
  build_runner: ^2.4.8
  freezed: ^2.4.6
  json_serializable: ^6.7.1
  mocktail: ^1.0.4

flutter:
  uses-material-design: true
  generate: true

  assets:
    - assets/images/
    - assets/templates/

  # fonts:
  #   - family: CustomFont
  #     fonts:
  #       - asset: assets/fonts/CustomFont-Regular.ttf
