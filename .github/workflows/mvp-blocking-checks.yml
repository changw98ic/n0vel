name: MVP Blocking Checks

on:
  push:
    paths:
      - ".github/workflows/mvp-blocking-checks.yml"
      - "analysis_options.yaml"
      - "lib/**"
      - "test/**"
      - "pubspec.yaml"
      - "pubspec.lock"
      - "Makefile"
      - "docs/**"
      - "editor.pen"
      - "scripts/validate_docs_bundle.py"
  pull_request:
    paths:
      - ".github/workflows/mvp-blocking-checks.yml"
      - "analysis_options.yaml"
      - "lib/**"
      - "test/**"
      - "pubspec.yaml"
      - "pubspec.lock"
      - "Makefile"
      - "docs/**"
      - "editor.pen"
      - "scripts/validate_docs_bundle.py"

jobs:
  blocking-gates:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: "3.41.9"
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze --no-pub

      - name: Test
        run: flutter test --no-pub -r compact

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Docs bundle check
        run: make docs-check
