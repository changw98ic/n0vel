name: Verify macOS

on:
  workflow_dispatch:
  push:
    paths:
      - ".github/workflows/verify-macos.yml"
      - "Makefile"
      - "scripts/**"
      - "lib/**"
      - "macos/**"
      - "pubspec.yaml"
      - "pubspec.lock"
      - "test/**"
  pull_request:
    paths:
      - ".github/workflows/verify-macos.yml"
      - "Makefile"
      - "scripts/**"
      - "lib/**"
      - "macos/**"
      - "pubspec.yaml"
      - "pubspec.lock"
      - "test/**"

jobs:
  verify-macos:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: "3.41.9"
          cache: true

      - name: Precache macOS artifacts
        run: flutter precache --macos

      - name: Verify macOS
        run: make verify-macos
