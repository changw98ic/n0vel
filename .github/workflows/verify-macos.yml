name: Verify macOS

on:
  workflow_dispatch:
  push:
    paths:
      - ".github/workflows/verify-macos.yml"
      - "assets/**"
      - "lib/**"
      - "macos/**"
      - "pubspec.yaml"
      - "pubspec.lock"
  pull_request:
    paths:
      - ".github/workflows/verify-macos.yml"
      - "assets/**"
      - "lib/**"
      - "macos/**"
      - "pubspec.yaml"
      - "pubspec.lock"

jobs:
  verify-macos:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: "3.41.9"
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build macOS release
        run: flutter build macos --release --no-pub
