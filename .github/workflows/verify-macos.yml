name: Verify macOS

on:
  workflow_dispatch:
  push:
    paths:
      - ".github/workflows/verify-macos.yml"
      - "Makefile"
      - "scripts/**"
      - "lib/**"
      - "macos/**"
      - "assets/**"
      - "pubspec.yaml"
      - "pubspec.lock"
  pull_request:
    paths:
      - ".github/workflows/verify-macos.yml"
      - "Makefile"
      - "scripts/**"
      - "lib/**"
      - "macos/**"
      - "assets/**"
      - "pubspec.yaml"
      - "pubspec.lock"

jobs:
  verify-macos:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: "3.41.9"
          cache: true

      - name: Precache macOS artifacts
        run: flutter precache --macos

      - name: Verify macOS
        if: github.event_name != 'workflow_dispatch'
        # Linux owns generic Dart analysis and tests. This gate keeps only
        # macOS-specific XCTest and native release-build coverage.
        run: make verify-macos-ci

      - name: Verify macOS with full Flutter suite
        if: github.event_name == 'workflow_dispatch'
        run: make verify-macos
