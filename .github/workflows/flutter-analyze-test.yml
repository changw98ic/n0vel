name: Flutter Analyze and Test

on:
  push:
    paths:
      - ".github/workflows/flutter-analyze-test.yml"
      - ".github/workflows/verify-macos.yml"
      - ".github/workflows/verify-windows.yml"
      - "analysis_options.yaml"
      - "Makefile"
      - "assets/**"
      - "lib/**"
      - "linux/**"
      - "macos/**"
      - "scripts/**"
      - "test/**"
      - "windows/**"
      - "pubspec.yaml"
      - "pubspec.lock"
  pull_request:
    paths:
      - ".github/workflows/flutter-analyze-test.yml"
      - ".github/workflows/verify-macos.yml"
      - ".github/workflows/verify-windows.yml"
      - "analysis_options.yaml"
      - "Makefile"
      - "assets/**"
      - "lib/**"
      - "linux/**"
      - "macos/**"
      - "scripts/**"
      - "test/**"
      - "windows/**"
      - "pubspec.yaml"
      - "pubspec.lock"

jobs:
  analyze-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: "3.41.9"
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze --no-pub

      - name: Test
        run: flutter test --no-pub -r compact

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install --yes \
            clang cmake ninja-build pkg-config libgtk-3-dev libstdc++-12-dev

      - name: Build Linux release
        run: flutter build linux --release --no-pub
