name: Flutter Analyze and Test

on:
  push:
    paths:
      - ".github/workflows/flutter-analyze-test.yml"
      - "analysis_options.yaml"
      - "lib/**"
      - "test/**"
      - "pubspec.yaml"
      - "pubspec.lock"
  pull_request:
    paths:
      - ".github/workflows/flutter-analyze-test.yml"
      - "analysis_options.yaml"
      - "lib/**"
      - "test/**"
      - "pubspec.yaml"
      - "pubspec.lock"

jobs:
  analyze-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: "3.27.4"
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze --no-pub

      - name: Test
        run: flutter test --no-pub -r compact
