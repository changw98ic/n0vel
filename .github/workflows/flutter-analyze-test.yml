name: Flutter Smoke Check

on:
  push:
    paths:
      - ".github/workflows/flutter-analyze-test.yml"
      - ".github/workflows/verify-macos.yml"
      - ".github/workflows/verify-windows.yml"
      - "analysis_options.yaml"
      - "Makefile"
      - "assets/**"
      - "lib/**"
      - "test/**"
      - "pubspec.yaml"
      - "pubspec.lock"
  pull_request:
    paths:
      - ".github/workflows/flutter-analyze-test.yml"
      - ".github/workflows/verify-macos.yml"
      - ".github/workflows/verify-windows.yml"
      - "analysis_options.yaml"
      - "Makefile"
      - "assets/**"
      - "lib/**"
      - "test/**"
      - "pubspec.yaml"
      - "pubspec.lock"

jobs:
  analyze-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: "3.41.9"
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze --no-pub

      - name: Core smoke tests
        run: make ci-smoke
